name: Playwright FE Tests

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code to branch dev
        uses: actions/checkout@v6
        with:
          ref: dev

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Create NPMRC
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_NPM_TOKEN }}" >> ~/.npmrc
          echo "@azavar:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo '"@azavar:registry" "https://npm.pkg.github.com/"' >> ~/.yarnrc

      - name: Install Dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_NPM_TOKEN }}
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test --project=chromium